<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='result.css') }}">
</head>
<body>
    <div class="result-container">
        <header>
            <h1>Student Result</h1>
        </header>
        
        <div class="student-details">
            <p><strong>Name:</strong> {{ student[1] }}</p>
            <p><strong>Roll No:</strong> {{ student[0] }}</p>
        </div>

        <h3>Exam: {{ exam_type }}</h3>

        <table>
            <tr>
                <th>Subject</th>
                <th>Marks</th>
            </tr>
            {% for subject, marks in results %}
            <tr>
                <td>{{ subject.title() }}</td>
                <td>{{ marks }}</td>
            </tr>
            {% endfor %}
        </table>

        <p class="total"><strong>Total Marks:</strong> {{ total_marks }}</p>
        <p class="percentage"><strong>Percentage:</strong> {{ percentage }}%</p>

        <div class="footer">
            <a href="/">Back to Home</a>
        </div>
    </div>
</body>
</html>
